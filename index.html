    <script>
        const video = document.getElementById('stegosaurus');
        const IDLE_SRC = 'public/animation-stegosaurus-idle.webm';
        const ATTACK_SRC = 'public/animation-stegosaurus-attack.webm';

        let currentState = 'idle';
        let lastMouseX = 0;
        let lastMouseY = 0;
        let lastMouseTime = 0;
        let velocitySamples = [];
        const SAMPLE_WINDOW = 5; // Number of samples to average
        const ATTACK_COOLDOWN = 1500; // Minimum time between attacks (ms)

        // Dynamic threshold: half screen height per second
        const getVelocityThreshold = () => window.innerHeight * 5;

        let lastAttackTime = 0;

        function getAverageVelocity() {
            if (velocitySamples.length === 0) return 0;
            return velocitySamples.reduce((a, b) => a + b, 0) / velocitySamples.length;
        }

        function switchToAttack() {
            if (currentState === 'attack') return;

            currentState = 'attack';
            video.loop = false;
            video.src = ATTACK_SRC;
            video.load();
            video.play();
        }

        function switchToIdle() {
            if (currentState === 'idle') return;

            currentState = 'idle';
            video.loop = true;
            video.src = IDLE_SRC;
            video.load();
            video.play();
        }

        document.addEventListener('mousemove', (e) => {
            const now = performance.now();
            const dt = (now - lastMouseTime) / 1000; // Convert to seconds

            if (dt > 0 && dt < 0.1) { // Only sample if time delta is reasonable
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const velocity = distance / dt;

                velocitySamples.push(velocity);
                if (velocitySamples.length > SAMPLE_WINDOW) {
                    velocitySamples.shift();
                }

                const avgVelocity = getAverageVelocity();

                if (avgVelocity > getVelocityThreshold() && now - lastAttackTime > ATTACK_COOLDOWN) {
                    lastAttackTime = now;
                    velocitySamples = []; // Reset samples
                    switchToAttack();
                }
            }

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            lastMouseTime = now;
        });

        // Return to idle when attack video ends
        video.addEventListener('ended', () => {
            if (currentState === 'attack') {
                switchToIdle();
            }
        });
    </script>
